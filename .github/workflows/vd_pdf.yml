name: Generate and Send VD PDF Report

on:
  schedule:
    - cron: '30 19 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client PyMuPDF pillow reportlab boto3 pytz

    - name: Run PDF Generator
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
        R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
        AISENSY_API_KEY: ${{ secrets.AISENSY_API_KEY }}
        SHEET_ID: ${{ secrets.SHEET_ID }}
        DESTINATIONS: ${{ secrets.DESTINATIONS }}
        CAMPAIGN_NAME: ${{ secrets.CAMPAIGN_NAME }}
      run: |
        python vd_pdf.py
